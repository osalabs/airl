name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Swatinem/rust-cache is purpose-built for Rust: it keys on Cargo.lock +
      # rust-toolchain + OS, only caches useful target/ artifacts, and prunes
      # stale entries automatically. Typical speedup: ~6min -> ~1min on warm runs.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-ubuntu"
          # Also cache target/ for the workspace; the action auto-detects this.
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rustdoc (deny missing docs)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Run examples (interpreter)
        run: |
          cargo run -p airl-cli -- run examples/hello.airl.json
          cargo run -p airl-cli -- run examples/fibonacci.airl.json
          cargo run -p airl-cli -- run examples/fizzbuzz.airl.json
          cargo run -p airl-cli -- run examples/string_ops.airl.json

      - name: Run examples (compiler)
        run: |
          cargo run -p airl-cli -- compile examples/hello.airl.json
          cargo run -p airl-cli -- compile examples/fibonacci.airl.json

      - name: Type check examples
        run: |
          cargo run -p airl-cli -- check examples/hello.airl.json
          cargo run -p airl-cli -- check examples/fibonacci.airl.json
          cargo run -p airl-cli -- check examples/fizzbuzz.airl.json
          cargo run -p airl-cli -- check examples/string_ops.airl.json
